<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Validation Tests — Book & Notes Vault</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f9f7f4;
      color: #1e1b18;
      line-height: 1.6;
    }
    h1 { color: #5b3e2b; margin-bottom: 8px; }
    p.subtitle { color: #6b5e4a; margin-bottom: 24px; }
    .test-block {
      background: #fff;
      border: 1px solid #e0d5c7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .test-block h2 { margin-top: 0; font-size: 1rem; color: #5b3e2b; }
    .pattern { font-family: monospace; background: #f3ede7; padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; word-break: break-all; }
    .pattern-note { color: #6b5e4a; font-size: 0.8rem; }
    .case { padding: 4px 0; font-size: 0.9rem; }
    .pass { color: #2d6a4f; }
    .fail { color: #c0392b; }
    .pass::before { content: '✅ '; }
    .fail::before { content: '❌ '; }
    .summary { background: #fff; border: 1px solid #e0d5c7; border-radius: 8px; padding: 16px; margin-top: 24px; }
    .summary.passed { border-color: #2d6a4f; }
    .summary.failed { border-color: #c0392b; }
    .source-note { font-size: 0.78rem; color: #6b5e4a; margin-top: 18px; }
    code { font-family: monospace; background: #f3ede7; padding: 1px 5px; border-radius: 3px; font-size: 0.82rem; }
    hr { border: none; border-top: 1px solid #e0d5c7; margin: 24px 0; }
  </style>
</head>
<body>
  <h1>Regex Validation Tests</h1>
  <p class="subtitle">Book &amp; Notes Vault — Verifying all 5 rules + 1 advanced (back-reference). Tests import and assert against the real <code>validators.js</code>, so patterns can never drift.</p>

  <div id="results"><p>Loading…</p></div>

  <script type="module">
    // ─── Import the REAL validators & patterns (single source of truth) ──────
    import validators, { PATTERNS } from './scripts/validators.js';

    // ─── Mini test runner ───────────────────────────────────────────────────
    const groups = [];
    let current = null;

    function group(name, patternSrc) {
      current = { name, pattern: patternSrc, tests: [] };
      groups.push(current);
    }

    function check(condition, message) {
      current.tests.push({ pass: !!condition, message });
    }

    function assertValid(fn, value, label) {
      const r = fn(value);
      check(r.valid === true, r.valid ? label : `${label} — validator returned: "${r.message}"`);
    }

    function assertInvalid(fn, value, label) {
      const r = fn(value);
      check(r.valid === false, r.valid ? `${label} — unexpectedly VALID` : label);
    }

    // ─── Rule 1: Title (multi-rule) ─────────────────────────────────────────
    group('Rule 1: Title', 'multi-rule (required, ≥2 chars, trimmed, no double spaces)');
    assertValid(validators.title, 'The Pragmatic Programmer', 'Title: valid book title passes');
    assertValid(validators.title, 'Dune', 'Title: short title passes');
    assertInvalid(validators.title, 'A', 'Title: single character fails (min 2)');
    assertInvalid(validators.title, '', 'Title: empty string fails');
    assertInvalid(validators.title, '  leading', 'Title: leading space fails');
    assertInvalid(validators.title, 'trailing  ', 'Title: trailing space fails');
    assertInvalid(validators.title, 'double  space', 'Title: double space fails');

    // ─── Rule 2: Author ─────────────────────────────────────────────────────
    group('Rule 2: Author', PATTERNS.author.source);
    assertValid(validators.author, 'David Thomas', 'Author: simple name passes');
    assertValid(validators.author, 'J.R.R. Tolkien', 'Author: initials with periods passes');
    assertValid(validators.author, 'Jean-Luc Picard', 'Author: hyphenated name passes');
    assertInvalid(validators.author, 'David123', 'Author: digits fail');
    assertInvalid(validators.author, '', 'Author: empty fails');

    // ─── Rule 3: Pages ──────────────────────────────────────────────────────
    group('Rule 3: Pages', PATTERNS.pages.source);
    assertValid(validators.pages, '1', 'Pages: 1 passes');
    assertValid(validators.pages, '352', 'Pages: 352 passes');
    assertValid(validators.pages, '0', 'Pages: 0 passes');
    assertValid(validators.pages, '9999', 'Pages: 9999 passes');
    assertInvalid(validators.pages, '-5', 'Pages: negative fails');
    assertInvalid(validators.pages, '3.5', 'Pages: decimal fails');
    assertInvalid(validators.pages, '', 'Pages: empty fails');
    assertInvalid(validators.pages, '01', 'Pages: leading zero fails');

    // ─── Rule 4: Date ───────────────────────────────────────────────────────
    group('Rule 4: Date', PATTERNS.date.source + ' + calendar check');
    assertValid(validators.date, '2025-06-15', 'Date: valid date passes');
    assertValid(validators.date, '2025-01-01', 'Date: Jan 1 passes');
    assertValid(validators.date, '2025-12-31', 'Date: Dec 31 passes');
    assertInvalid(validators.date, '2025-13-01', 'Date: month 13 fails');
    assertInvalid(validators.date, '2025-00-01', 'Date: month 0 fails');
    assertInvalid(validators.date, '2025-06-32', 'Date: day 32 fails');
    assertInvalid(validators.date, '25-06-15', 'Date: short year fails');
    assertInvalid(validators.date, '2025-02-30', 'Date: Feb 30 fails (calendar check)');

    // ─── Rule 5: Tag ────────────────────────────────────────────────────────
    group('Rule 5: Tag', PATTERNS.tag.source);
    assertValid(validators.tag, 'Fiction', 'Tag: simple tag passes');
    assertValid(validators.tag, 'Non-Fiction', 'Tag: hyphenated tag passes');
    assertValid(validators.tag, 'Data Science', 'Tag: space-separated passes');
    assertInvalid(validators.tag, '123', 'Tag: digits fail');
    assertInvalid(validators.tag, '', 'Tag: empty fails');

    // ─── Advanced: Duplicate words (back-reference) ─────────────────────────
    group('Advanced: Duplicate Words (back-reference)', PATTERNS.duplicateWords.source);
    assertInvalid(validators.titleNoDuplicates, 'The The Book', 'DupWords: "The The" rejected');
    assertInvalid(validators.titleNoDuplicates, 'hello hello world', 'DupWords: "hello hello" rejected');
    assertInvalid(validators.titleNoDuplicates, 'This is is wrong', 'DupWords: "is is" rejected');
    assertValid(validators.titleNoDuplicates, 'The Book', 'DupWords: normal text passes');
    assertValid(validators.titleNoDuplicates, 'Hello World', 'DupWords: different words pass');

    // ─── Render ─────────────────────────────────────────────────────────────
    const total = groups.reduce((s, g) => s + g.tests.length, 0);
    const failed = groups.reduce((s, g) => s + g.tests.filter((t) => !t.pass).length, 0);
    const passed = total - failed;

    let html = '';
    groups.forEach((g) => {
      html += `<div class="test-block">`;
      html += `<h2>${g.name}</h2>`;
      html += `<p class="pattern-note">Pattern: <code class="pattern">${g.pattern}</code></p>`;
      g.tests.forEach((t) => {
        html += `<div class="case ${t.pass ? 'pass' : 'fail'}">${escapeHTML(t.message)}</div>`;
      });
      html += `</div>`;
    });

    html += `<div class="summary ${failed === 0 ? 'passed' : 'failed'}">`;
    html += `<h2>${failed === 0 ? '✅ All Tests Passed' : '❌ Some Tests Failed'}</h2>`;
    html += `<p>${passed}/${total} passed, ${failed} failed.</p>`;
    html += `</div>`;

    html += `<p class="source-note">Patterns &amp; rules are imported live from <code>scripts/validators.js</code> via <code>PATTERNS</code> — the test page can never diverge from the app.</p>`;

    document.getElementById('results').innerHTML = html;

    // Console summary for quick verification
    console.log(`Validation tests: ${passed}/${total} passed, ${failed} failed.`);

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
